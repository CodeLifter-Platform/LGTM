name: Build & Release

on:
  push:
    branches: ['**']       # Build on all branch pushes
  pull_request:
    branches: [main]       # Build on PRs targeting main
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write          # Needed to create releases, tags, and push version commits

# ── Version strategy ──────────────────────────────────────────────
#
#   MAJOR  → GitHub Actions variable "MAJOR_VERSION" (default: 1)
#            Bump manually in repo Settings → Variables → Actions
#   MINOR  → GITHUB_RUN_NUMBER (auto-increments every workflow run)
#   PATCH  → always 0
#
#   main branch:    1.42.0          (clean release)
#   other branches: 1.42.0-pre.87+abc1234  (prerelease)
#
# To start a new major version:
#   1. Go to Settings → Secrets and variables → Actions → Variables
#   2. Set MAJOR_VERSION to the new number (e.g., 2)
#   3. Next push to main becomes 2.43.0
# ──────────────────────────────────────────────────────────────────

jobs:
  # ── Generate version number ────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      version_tag: ${{ steps.semver.outputs.version_tag }}
      is_release: ${{ steps.semver.outputs.is_release }}
    steps:
      - name: Generate semantic version
        id: semver
        run: |
          MAJOR="${{ vars.MAJOR_VERSION || '1' }}"
          MINOR="${{ github.run_number }}"
          PATCH="0"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IS_MAIN="${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}"

          if [ "$IS_MAIN" = "true" ]; then
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            IS_RELEASE="true"
          else
            VERSION="${MAJOR}.${MINOR}.${PATCH}-pre.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
            IS_RELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "### Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Release: ${IS_RELEASE}" >> "$GITHUB_STEP_SUMMARY"

  # ── macOS build ────────────────────────────────────────────────
  build-mac:
    needs: version
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp version into package.json
        run: npm version "$APP_VERSION" --no-git-tag-version --allow-same-version

      - name: Build macOS installer
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lgtm-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  # ── Windows build ──────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp version into package.json
        run: npm version "$env:APP_VERSION" --no-git-tag-version --allow-same-version
        shell: pwsh

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lgtm-windows
          path: |
            dist/*.exe
          if-no-files-found: error

  # ── Release (main branch only) ─────────────────────────────────
  release:
    if: needs.version.outputs.is_release == 'true'
    needs: [version, build-mac, build-windows]
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      VERSION_TAG: ${{ needs.version.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stamp version into package.json
        run: npm version "$APP_VERSION" --no-git-tag-version --allow-same-version

      - name: Update release history in README
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          REPO_URL="https://github.com/CodeLifterIO/LGTM"
          NEW_ROW="| ${VERSION_TAG} | ${RELEASE_DATE} | [dmg](${REPO_URL}/releases/download/${VERSION_TAG}/LGTM-arm64.dmg) · [zip](${REPO_URL}/releases/download/${VERSION_TAG}/LGTM-arm64.zip) | [installer](${REPO_URL}/releases/download/${VERSION_TAG}/LGTM-Setup.exe) · [portable](${REPO_URL}/releases/download/${VERSION_TAG}/LGTM-Portable.exe) | [Release notes](${REPO_URL}/releases/tag/${VERSION_TAG}) |"
          awk -v row="$NEW_ROW" '/<!-- RELEASE_TABLE_MARKER -->/{print row} {print}' README.md > README.tmp && mv README.tmp README.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json README.md
          git diff --cached --quiet || git commit -m "chore: bump version to ${APP_VERSION} [skip ci]"
          git tag "$VERSION_TAG"
          git push origin main --tags

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: lgtm-mac
          path: dist

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lgtm-windows
          path: dist

      - name: List release files
        run: ls -lhR dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: "LGTM ${{ env.VERSION_TAG }}"
          draft: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
