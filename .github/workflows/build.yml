name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags: v1.0.0, v1.2.3-beta, etc.
  workflow_dispatch:    # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to create releases and upload assets

jobs:
  # ── macOS build ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run build:mac
        env:
          # For unsigned builds, skip notarization
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lgtm-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  # ── Windows build ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lgtm-windows
          path: |
            dist/*.exe
          if-no-files-found: error

  # ── Create GitHub Release (only on tag push) ─────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: lgtm-mac
          path: dist

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lgtm-windows
          path: dist

      - name: List release files
        run: ls -lhR dist/

      - name: Collect asset filenames
        id: assets
        run: |
          DMG=$(ls dist/*.dmg | head -1 | xargs basename)
          ZIP=$(ls dist/*mac*.zip 2>/dev/null | head -1 | xargs basename || ls dist/*.zip | head -1 | xargs basename)
          SETUP=$(ls dist/*Setup*.exe 2>/dev/null | head -1 | xargs basename || ls dist/*setup*.exe | head -1 | xargs basename)
          PORTABLE=$(ls dist/*.exe | grep -v -i setup | head -1 | xargs basename)
          TAG="${GITHUB_REF#refs/tags/}"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "setup=$SETUP" >> "$GITHUB_OUTPUT"
          echo "portable=$PORTABLE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update README download links
        run: |
          TAG="${{ steps.assets.outputs.tag }}"
          DMG="${{ steps.assets.outputs.dmg }}"
          ZIP="${{ steps.assets.outputs.zip }}"
          SETUP="${{ steps.assets.outputs.setup }}"
          PORTABLE="${{ steps.assets.outputs.portable }}"
          BASE="https://github.com/CodeLifterIO/LGTM/releases/download/${TAG}"

          sed -i "s|.*\*\*macOS\*\*.*|| **macOS** | [${DMG}](${BASE}/${DMG}) | [${ZIP}](${BASE}/${ZIP}) |" README.md
          sed -i "s|.*\*\*Windows\*\*.*|| **Windows** | [${SETUP}](${BASE}/${SETUP}) | [${PORTABLE}](${BASE}/${PORTABLE}) |" README.md

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README download links for ${{ steps.assets.outputs.tag }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
